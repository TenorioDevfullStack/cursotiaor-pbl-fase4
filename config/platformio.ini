# O codigo-fonte do ESP32 fica em src/ (na raiz do projeto). Como este arquivo
# foi movido para config/ seguindo o template FIAP, apontamos src_dir para ../src.
# Para compilar, rode os comandos do PlatformIO/Wokwi a partir da pasta config/.
[platformio]
src_dir = ../src

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
